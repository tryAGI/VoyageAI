site_name: VoyageAI .NET Documentation
site_description: Documentation for the tryAGI .NET SDK for VoyageAI.
site_url: https://tryagi.github.io/VoyageAI/
repo_url: https://github.com/tryAGI/VoyageAI
repo_name: tryAGI/VoyageAI
edit_uri: edit/main/docs/
nav:
- Overview: index.md
- Guides:
  - Microsoft.Extensions.AI: guides/meai.md
# EXAMPLES:START
- Examples:
  - Embedding Generator Generate Async: examples/embedding-generator-generate-async.md
  - Embedding Generator Get Service Returns Metadata: examples/embedding-generator-get-service-returns-metadata.md
  - Embedding Generator Get Service Returns Self: examples/embedding-generator-get-service-returns-self.md
  - Embeddings: examples/embeddings.md
  - Multimodal Embeddings Text And Image Url: examples/multimodal-embeddings-text-and-image-url.md
  - Multimodal Embeddings Text Only: examples/multimodal-embeddings-text-only.md
  - Reranking: examples/reranking.md
# EXAMPLES:END

theme:
  name: tryagi
  favicon: 'media/icon128.png'

plugins:
  - search
  - copy-to-llm

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - toc:
      permalink: ""
      slugify: !!python/name:pymdownx.slugs.uslugify
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.progressbar
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
